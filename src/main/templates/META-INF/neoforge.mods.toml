modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "${mod_license}"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
displayURL = "https://www.curseforge.com/minecraft/mc-mods/jeioptimizer"
issueTrackerURL = "https://github.com/bigenergy/JEIOptimizer/issues"
authors = "${mod_authors}"
description = '''${mod_description}'''

[[mixins]]
config = "${mod_id}.mixins.json"

# -------- Dependencies --------

[[dependencies."${mod_id}"]]
modId = "neoforge"
type = "required"
versionRange = "${neo_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies."${mod_id}"]]
modId = "minecraft"
type = "required"
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "BOTH"

# JEI is required client-side — all our mixins target JEI classes.
# Server-side this mod is no-op (mixins are client-only).
[[dependencies."${mod_id}"]]
modId = "jei"
type = "required"
versionRange = "[19.0.0,)"
ordering = "AFTER"
side = "CLIENT"
